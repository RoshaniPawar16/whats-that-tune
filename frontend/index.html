<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whats-that-tune</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f0f;
      --surface:      #181818;
      --surface2:     #222;
      --border:       #2c2c2c;
      --text:         #e6e6e6;
      --muted:        #5a5a5a;
      --accent:       #f0a500;
      --accent-glow:  rgba(240,165,0,0.18);
      --danger:       #e05050;
      --danger-glow:  rgba(224,80,80,0.20);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px; line-height: 1.5; }

    /* ── Layout ─────────────────────────────────────────────── */

    .app {
      display: grid;
      grid-template-columns: 1fr 300px;
      height: 100vh;
    }

    /* ── Left / main ────────────────────────────────────────── */

    .main {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .topbar-session { font-size: 11px; color: var(--muted); font-family: monospace; }

    /* Mnemo message */
    .mnemo-area {
      padding: 18px 22px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 80px;
    }
    .mnemo-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); margin-bottom: 6px;
    }
    #mnemo-msg {
      font-size: 15px; color: var(--text);
    }
    #mnemo-question {
      font-size: 14px; color: var(--accent); margin-top: 5px;
    }

    /* History */
    .history {
      flex: 1;
      overflow-y: auto;
      padding: 14px 22px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .history::-webkit-scrollbar { width: 3px; }
    .history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .h-msg { display: flex; gap: 10px; align-items: baseline; }
    .h-role {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--muted); flex-shrink: 0; width: 46px;
    }
    .h-msg.user .h-role { color: var(--accent); }
    .h-text { font-size: 13px; color: var(--muted); }

    /* Status bar */
    .statusbar {
      height: 28px; display: flex; align-items: center; gap: 7px;
      padding: 0 22px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .spin {
      width: 9px; height: 9px; border-radius: 50%;
      border: 1.5px solid var(--border); border-top-color: var(--accent);
      animation: spin 0.55s linear infinite; display: none; flex-shrink: 0;
    }
    .busy .spin { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-text { font-size: 11px; color: var(--muted); }

    /* Input area */
    .input-area {
      padding: 16px 22px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    /* Mic button */
    .mic-wrap {
      position: relative;
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
    }

    .ripple {
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid var(--danger);
      opacity: 0;
      pointer-events: none;
    }
    .rec .ripple:nth-child(1) { animation: rip 1.6s ease-out infinite; }
    .rec .ripple:nth-child(2) { animation: rip 1.6s ease-out 0.45s infinite; }
    .rec .ripple:nth-child(3) { animation: rip 1.6s ease-out 0.9s infinite; }
    @keyframes rip {
      0%   { transform: scale(1);   opacity: 0.65; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    #mic-btn {
      position: relative; z-index: 1;
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface2);
      font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #mic-btn:hover { background: var(--surface); }
    #mic-btn:active { transform: scale(0.95); }
    .rec #mic-btn { background: var(--danger); border-color: var(--danger); }

    #mic-tick {
      position: absolute; bottom: -18px;
      font-size: 11px; color: var(--danger);
      font-variant-numeric: tabular-nums;
      opacity: 0; transition: opacity 0.15s;
    }
    .rec #mic-tick { opacity: 1; }

    /* Text row */
    .text-row { display: flex; gap: 8px; width: 100%; }
    #text-in {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 13px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.18s;
      min-width: 0;
    }
    #text-in:focus { border-color: var(--accent); }
    #text-in::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 13px;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    #send-btn:hover { opacity: 0.84; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Right / candidates ─────────────────────────────────── */

    .side {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      min-height: 0;
    }
    .side-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .cand-list {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }
    .cand-empty {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 28px 10px;
      line-height: 1.6;
    }
    .cand {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      transition: border-color 0.35s;
    }
    .cand.top { border-color: rgba(240,165,0,0.35); }
    .cand-title {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .cand-artist {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-track {
      flex: 1; height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bar-pct {
      font-size: 11px; color: var(--muted);
      min-width: 28px; text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── Mobile ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; height: 100dvh; }
      .main { border-right: none; }
      .side { max-height: 210px; border-top: 1px solid var(--border); }
      .cand-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 10px; }
      .cand { min-width: 175px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Main panel ─────────────────────────────────────────── -->
  <div class="main">

    <div class="topbar">
      <span class="topbar-title">whats-that-tune</span>
      <span class="topbar-session" id="session-label">connecting...</span>
    </div>

    <div class="mnemo-area">
      <div class="mnemo-label">Mnemo</div>
      <div id="mnemo-msg">Hum it, describe how it felt, or say a word you remember.</div>
      <div id="mnemo-question"></div>
    </div>

    <div class="history" id="history"></div>

    <div class="statusbar" id="statusbar">
      <div class="spin"></div>
      <span id="status-text">ready</span>
    </div>

    <div class="input-area">
      <div class="mic-wrap" id="mic-wrap">
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <button id="mic-btn" title="Click to record 5 seconds">&#127908;</button>
        <span id="mic-tick"></span>
      </div>

      <div class="text-row">
        <input id="text-in" type="text"
          placeholder="or type a clue - lyric, decade, mood..."
          autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <!-- ── Candidates panel ───────────────────────────────────── -->
  <div class="side">
    <div class="side-header">Candidates</div>
    <div class="cand-list" id="cand-list">
      <div class="cand-empty">No candidates yet.<br>Give Mnemo a clue.</div>
    </div>
  </div>

</div>
<script>
  const API = 'http://localhost:8000';

  let sessionId   = null;
  let recorder    = null;
  let recChunks   = [];
  let isRec       = false;
  let recTimer    = null;
  let recMime     = 'audio/webm';
  let busy        = false;

  // ── Session ────────────────────────────────────────────────

  async function init() {
    try {
      const r = await fetch(`${API}/session`, { method: 'POST' });
      const d = await r.json();
      sessionId = d.session_id;
      document.getElementById('session-label').textContent = 'session ' + sessionId;
    } catch {
      setStatus('Cannot reach backend. Is uvicorn running on :8000?', true);
      document.getElementById('session-label').textContent = 'offline';
    }
  }

  // ── Turn ───────────────────────────────────────────────────

  async function turn(message, blob) {
    if (busy || !sessionId) return;
    busy = true;
    setBusy(true);

    const label = message || (blob ? '(audio clue)' : '');
    if (label) addHistory('you', label);

    const form = new FormData();
    if (message) form.append('message', message);
    if (blob) {
      const ext  = recMime.includes('webm') ? 'webm' : 'mp4';
      form.append('audio', blob, `hum.${ext}`);
    }

    try {
      const r = await fetch(`${API}/session/${sessionId}/turn`, {
        method: 'POST', body: form
      });
      const d = await r.json();
      if (d.error) {
        setStatus(`${d.error}: ${d.detail}`, true);
      } else {
        setMnemo(d.message_to_user, d.next_question);
        renderCandidates(d.updated_candidates || []);
        if (d.message_to_user) addHistory('mnemo', d.message_to_user);
        setStatus('ready');
      }
    } catch (e) {
      setStatus('Request failed - check console.', true);
      console.error(e);
    } finally {
      busy = false;
      setBusy(false);
    }
  }

  // ── Recording ──────────────────────────────────────────────

  document.getElementById('mic-btn').addEventListener('click', toggleRec);

  async function toggleRec() {
    if (isRec) { stopRec(); return; }

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      setStatus('Microphone access denied.', true); return;
    }

    // Pick best supported MIME type
    recMime = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4']
      .find(t => MediaRecorder.isTypeSupported(t)) || '';

    recChunks = [];
    recorder  = new MediaRecorder(stream, recMime ? { mimeType: recMime } : {});
    recorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      turn('', new Blob(recChunks, { type: recMime || 'audio/webm' }));
    };

    recorder.start();
    isRec = true;
    document.getElementById('mic-wrap').classList.add('rec');
    document.getElementById('mic-btn').innerHTML = '&#9646;&#9646;'; // pause icon

    let secs = 5;
    const tick = document.getElementById('mic-tick');
    tick.textContent = secs + 's';
    recTimer = setInterval(() => {
      secs--;
      tick.textContent = secs + 's';
      if (secs <= 0) stopRec();
    }, 1000);
  }

  function stopRec() {
    clearInterval(recTimer);
    recorder.stop();
    isRec = false;
    document.getElementById('mic-wrap').classList.remove('rec');
    document.getElementById('mic-btn').innerHTML = '&#127908;';
    document.getElementById('mic-tick').textContent = '';
  }

  // ── UI ─────────────────────────────────────────────────────

  function setMnemo(msg, question) {
    if (msg)      document.getElementById('mnemo-msg').textContent      = msg;
    document.getElementById('mnemo-question').textContent = question || '';
  }

  function renderCandidates(list) {
    const el = document.getElementById('cand-list');
    if (!list.length) return;
    el.innerHTML = list.slice(0, 3).map((c, i) => `
      <div class="cand ${i === 0 ? 'top' : ''}">
        <div class="cand-title">${esc(c.title)}</div>
        <div class="cand-artist">${esc(c.artist)}</div>
        <div class="bar-row">
          <div class="bar-track">
            <div class="bar-fill" data-w="${Math.round((c.confidence || 0) * 100)}"></div>
          </div>
          <span class="bar-pct">${Math.round((c.confidence || 0) * 100)}%</span>
        </div>
      </div>
    `).join('');
    // Animate bars after paint
    requestAnimationFrame(() =>
      el.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.dataset.w + '%')
    );
  }

  function addHistory(role, text) {
    const d = document.createElement('div');
    d.className = 'h-msg ' + role;
    d.innerHTML = `<span class="h-role">${role}</span><span class="h-text">${esc(text)}</span>`;
    const h = document.getElementById('history');
    h.appendChild(d);
    h.scrollTop = h.scrollHeight;
  }

  function setBusy(on) {
    document.getElementById('statusbar').classList.toggle('busy', on);
    document.getElementById('text-in').disabled  = on;
    document.getElementById('send-btn').disabled = on;
    document.getElementById('mic-btn').disabled  = on;
    if (on) setStatus('Mnemo is thinking...');
  }

  function setStatus(msg, err) {
    const el = document.getElementById('status-text');
    el.textContent  = msg;
    el.style.color  = err ? 'var(--danger)' : '';
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Wire inputs ────────────────────────────────────────────

  document.getElementById('send-btn').addEventListener('click', () => {
    const inp = document.getElementById('text-in');
    const msg = inp.value.trim();
    if (!msg) return;
    inp.value = '';
    turn(msg, null);
  });

  document.getElementById('text-in').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('send-btn').click(); }
  });

  init();
</script>
</body>
</html>
